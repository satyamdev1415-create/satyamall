<!DOCTYPE html>

<html>
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Your Cart </h2>

```
<table class="table">
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Action</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>₹{{ product.price }}</td>
        <td>{{ product.quantity }}</td>
        <td>₹{{ product.total_price }}</td>
        <td>
            <a href="/remove/{{ product.id }}/" class="btn btn-danger">Remove</a>
        </td>
        <td>
            <a href="/checkout/" class="btn btn-primary">
              Proceed to Checkout
            </a>
            <a href="/update/{{ product.id }}/inc/" class="btn btn-success btn-sm">+</a>
            <a href="/update/{{ product.id }}/dec/" class="btn btn-warning btn-sm">-</a>
        </td>
    </tr>
    {% endfor %}
</table>


<h3>Total: ₹{{ total }}</h3>
```

</div>

</body>
</html>
